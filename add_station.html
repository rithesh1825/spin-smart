{% extends 'base.html' %}
{% block title %}Add Station{% endblock %}
{% block page_title %}Add Base Station{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-lg-5">
<div class="card">
    <div class="card-header"><i class="fas fa-map-marker-alt me-2" style="color:var(--accent)"></i>Register New Station</div>
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Station Name *</label>
                <input type="text" name="name" class="form-control" placeholder="e.g. Ameerpet" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Location / Area *</label>
                <input type="text" name="locations" class="form-control" placeholder="e.g. Ameerpet, Hyderabad" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Parking Capacity *</label>
                <input type="number" name="capacity" class="form-control" placeholder="e.g. 100" min="1" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-fill"><i class="fas fa-plus me-2"></i>Add Station</button>
                <a href="{{ url_for('stations') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
</div>
{% endblock %}
